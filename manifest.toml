#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "pureblog"
name = "PureBlog"
description.en = "Blogging platform, designed for personal use"
description.fr = "Plateforme de blog, conçue pour un usage personnel"

version = "2.4.9~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "LicenseRef-Pure-Blog-1"
website = "https://pureblog.org/"
admindoc = "https://pureblog.org/docs"
code = "https://github.com/kevquirk/pureblog/"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    #[install.path]
    #type = "path"
    #default = "/pureblog"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    #[install.admin]
    #type = "user"

    #[install.password]
    #help.en = "Use the help field to add an information for the admin about this question."
    #help.fr = "Utilisez le champ aide pour ajouter une information à l'intention de l'administrateur à propos de cette question."
    #type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/kevquirk/pureblog/archive/refs/tags/v2.4.9.tar.gz"
    sha256 = "39a6c44550d5974ed41414f0807a929fa9eaada494a4a0335c64acbe58c6961f"

    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"
    
    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "php8.5-mbstring, php8.5-curl, php8.5-zip"
