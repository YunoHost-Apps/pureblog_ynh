#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "pureblog"
name = "PureBlog"
description.en = "Blogging platform, designed for personal use"
description.fr = "Plateforme de blog, conçue pour un usage personnel"

version = "3.0.2~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "LicenseRef-Pure-Blog-1"
license_url = "https://codeberg.org/kevquirk/pureblog/src/branch/main/LICENSE.md"
website = "https://pureblog.org/"
admindoc = "https://pureblog.org/docs"
code = "https://codeberg.org/kevquirk/pureblog"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    #[install.path]
    #type = "path"
    #default = "/pureblog"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    #[install.admin]
    #type = "user"

    #[install.password]
    #help.en = "Use the help field to add an information for the admin about this question."
    #help.fr = "Utilisez le champ aide pour ajouter une information à l'intention de l'administrateur à propos de cette question."
    #type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://codeberg.org/kevquirk/pureblog/archive/v3.0.2.tar.gz"
    sha256 = "9c46c5628bc4839ab061fbd4fa9de2d4257e1c4b5c96a95b635b996af627c9af"

    autoupdate.strategy = "latest_forgejo_release"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"
    
    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "php8.5-mbstring, php8.5-xml, php8.5-curl, php8.5-zip"
